[package]
name = "reth-passbook"
edition.workspace = true
license.workspace = true
version = "0.1.0"

[[bin]]
name = "reth-passbook"
path = "src/main.rs"

[dependencies]
passbook-core = { path = "../../passbook-core" }
passbook-stack-ethereum = { path = "../../passbook-stack-ethereum" }
reth-ethereum.workspace = true
reth-cli-util.workspace = true
reth-node-core.workspace = true
alloy-primitives = { workspace = true, optional = true }
clap.workspace = true
eyre.workspace = true
tokio.workspace = true
futures.workspace = true

[build-dependencies]
vergen = { version = "9.1.0", default-features = false, features = ["cargo"] }

[features]
jemalloc = ["reth-cli-util/jemalloc"]
asm-keccak = ["dep:alloy-primitives", "alloy-primitives/asm-keccak"]
