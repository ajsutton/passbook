name: CI

# Gate `main` and same-repo pull requests on the EXACT commands run locally
# in Task 9.2:
#   cargo fmt --all --check
#   cargo clippy --workspace --all-targets --locked -- -D warnings
#   cargo test --workspace --locked
# plus the multi-stage Docker image builds + in-image smokes (Task 9.1).
#
# Trigger policy (this repo is public):
#   * push to `main`  — full CI; images published to GHCR tagged with the
#                  commit SHA.
#   * push of a tag   — full CI; images published to GHCR tagged with the
#                  git tag name (release version).
#   * other branch pushes — do NOT build; CI starts when a PR is opened.
#   * pull_request — builds + smokes only, never publishes. Safety against
#                  untrusted fork PRs is
#                  enforced OUTSIDE this file by the repository setting
#                  Settings → Actions → General → "Fork pull request workflows
#                  from outside collaborators" = "Require approval for all
#                  outside collaborators". With that set, a fork PR's workflow
#                  does not run at all until a maintainer approves it, so no
#                  untrusted code executes and no Actions minutes are spent.
#                  (Do NOT add per-job `if` fork guards here — a job skipped by
#                  `if` reports as a PASSING required status check.)
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

# Least privilege. Fork-PR tokens are already read-only with no secret access;
# stating it explicitly also constrains internal-PR and main runs.
permissions:
  contents: read

# `.vendor/` and `.cargo/` are gitignored: every cargo invocation MUST be
# preceded by `bash scripts/seed-vendor.sh`, which shallow-clones the pinned
# optimism monorepo rev and writes the machine-local .cargo/config.toml. It
# needs the system git binary, so git-fetch-with-cli is forced job-wide.
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always
  # ubuntu-latest has two disks: `/` (~21 GB free, where preinstalled tooling
  # + Docker layers live) and `/mnt` (~70 GB free, ~empty). The reth + op-reth
  # compile overflows `/` (os error 28). Put cargo's `target/` on `/mnt`
  # instead of deleting preinstalled tooling — far more space, non-destructive.
  # (The test job's "Prepare /mnt build dir" step creates this path; only host
  # cargo reads this var, so the Docker-based images job is unaffected.)
  CARGO_TARGET_DIR: /mnt/cargo-target
  # Orthogonal CI hygiene (not a disk workaround): debuginfo dominates a
  # reth-scale `target/`; `line-tables-only` keeps panic/backtrace line numbers
  # while cutting size + I/O. Kept because it's a sensible default, not because
  # space is tight.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Put cargo's target dir (set via CARGO_TARGET_DIR in workflow env) on the
      # large /mnt scratch disk instead of the cramped /. /mnt is root-owned on
      # hosted runners, so create + chown to the runner user. Non-destructive:
      # nothing preinstalled is deleted.
      - name: Prepare /mnt build dir
        run: |
          set -x
          sudo mkdir -p /mnt/cargo-target
          sudo chown -R "$(id -u):$(id -g)" /mnt/cargo-target
          df -h / /mnt

      # Pinned toolchain — matches rust-toolchain.toml channel 1.95.0 and its
      # rustfmt + clippy components (the gates below need both).
      - name: Install pinned Rust 1.95.0
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt, clippy

      # Cache the cargo registry + git DB keyed on Cargo.lock. This does NOT
      # break `--locked`: the cache only pre-populates ~/.cargo/{registry,git}
      # (download cache); Cargo.lock itself is committed and untouched, and
      # `--locked` still fails the build if anything would change it. The
      # reth/optimism git compile is very long, so this materially speeds reruns.
      - name: Cache cargo registry + git
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # REQUIRED before ANY cargo command: .vendor/ + .cargo/config.toml are
      # gitignored and regenerated per machine/CI. ubuntu-latest ships git.
      - name: Seed vendor mirror (.vendor + .cargo/config.toml)
        run: bash scripts/seed-vendor.sh

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets --locked -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

  # !!! TEMPORARY diagnostic job — get ground truth on the hosted runner's
  # disk/mem topology instead of guessing. Finishes in seconds. REMOVE once
  # the images-job disk/OOM strategy is settled (tracked as task #3).
  runner-info:
    name: runner-info (TEMP)
    runs-on: ubuntu-latest
    steps:
      - name: Dump disk + memory topology
        run: |
          set -x
          uname -a
          echo "nproc=$(nproc)"
          free -h
          echo "===== df -h ====="
          df -h
          echo "===== findmnt / and /mnt ====="
          findmnt / || true
          findmnt /mnt || true
          echo "===== lsblk ====="
          lsblk -f || true
          echo "===== /mnt listing ====="
          ls -la /mnt || true
          echo "===== swap ====="
          swapon --show || echo "(no swap configured)"
          echo "===== /var/lib/docker ====="
          ls -la /var/lib/docker 2>/dev/null || true
          sudo du -sh /var/lib/docker 2>/dev/null || true

  images:
    name: docker images + smokes + publish
    # !!! TEMPORARY: `needs: test` is intentionally REMOVED so this job runs
    # in parallel with the ~30-min test job while we iterate on the Docker
    # /mnt relocation + build. Tests are currently green (run 25976721476:
    # fmt+clippy+test all passed), so publishing without the gate is an
    # accepted, time-boxed risk.
    #
    # MUST RESTORE before this is considered done — uncomment the line below.
    # Original rationale: nothing here (build/smoke/publish) should run, and
    # no image should publish, from a commit whose Rust suite failed. `needs:`
    # is job-level only (no step-level needs), so gating publish on `test`
    # means gating the whole job. Cost when restored: images no longer runs
    # parallel to test, so wall-clock ~= test + images.
    # needs: test   # <-- TEMPORARILY DISABLED, RE-ENABLE (see task #2)
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the top-level block, so contents:read must
    # be restated. packages:write lets GITHUB_TOKEN push to this repo's GHCR
    # namespace — no external registry secret needed. (On pull_request the
    # token is read-only regardless; the publish steps are also `if`-gated to
    # push events, so PRs never attempt a push.)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # This job compiles reth twice (both Docker targets); Docker stores all
      # build layers under its data-root, which defaults to /var/lib/docker on
      # the cramped / (~21 GB) and overflows. Relocate the data-root to the
      # large /mnt scratch disk — non-destructive, nothing preinstalled deleted.
      #
      # Robust recipe (the prior `systemctl restart docker` was fragile and
      # took the runner down mid-build): fully STOP docker.service AND
      # docker.socket, MIGRATE the existing tree, symlink, then start. Finally
      # ASSERT the daemon's real root is on /mnt and FAIL FAST (seconds) if not
      # — so a silent relocation miss can never again surface as a 69-minute
      # runner death with no logs.
      - name: Relocate Docker storage to /mnt
        run: |
          set -euxo pipefail
          sudo systemctl stop docker.service docker.socket
          sudo mkdir -p /mnt/docker
          # Migrate any existing layers, then replace /var/lib/docker with a
          # symlink so the data-root move is transparent to everything.
          if [ -d /var/lib/docker ] && [ ! -L /var/lib/docker ]; then
            sudo rsync -aqHX --remove-source-files /var/lib/docker/ /mnt/docker/ || true
            sudo rm -rf /var/lib/docker
          fi
          sudo ln -sfn /mnt/docker /var/lib/docker
          sudo systemctl start docker.service
          # Wait for the daemon, then hard-assert the real root is on /mnt.
          for _ in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 1; done
          root="$(docker info --format '{{.DockerRootDir}}')"
          realroot="$(readlink -f "$root")"
          echo "Docker root: $root -> $realroot"
          case "$realroot" in
            /mnt/*) echo "OK: Docker storage is on /mnt" ;;
            *) echo "FATAL: Docker root '$realroot' is NOT on /mnt — aborting before the long build"; exit 1 ;;
          esac
          df -h / /mnt

      # ubuntu-latest is 4 vCPU / 16 GB RAM with ~no swap. The reth+op-reth
      # link/codegen peak inside the Docker build exceeds 16 GB, the kernel
      # OOM-kills, and the runner "loses communication with the server" ~74 min
      # in with no logs (observed runs 25976721476 / 25978939419). Add a large
      # swapfile on the spacious /mnt so the peak spills to disk instead of
      # killing the runner. Slower, but it finishes instead of dying.
      # Non-destructive; images job only (the test job is green, untouched).
      - name: Add swap on /mnt (prevent OOM runner loss)
        run: |
          set -euxo pipefail
          sudo fallocate -l 24G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          swapon --show
          free -h

      # The Dockerfile self-seeds (its build stage runs scripts/seed-vendor.sh),
      # so no host seed step is needed for this job.
      - name: Build reth-passbook image
        run: docker build --target reth-passbook -t reth-passbook:ci .

      - name: Build op-reth-passbook image
        run: docker build --target op-reth-passbook -t op-reth-passbook:ci .

      # Static surface check: the `--passbook.addresses` flag is present on the
      # node command for both binaries (Task 8.3). Cheap, and a prerequisite
      # for the runtime smoke below.
      - name: Smoke — reth-passbook node --help exposes passbook.addresses
        run: docker run --rm reth-passbook:ci node --help | grep -q passbook.addresses

      - name: Smoke — op-reth-passbook node --help exposes passbook.addresses
        run: docker run --rm op-reth-passbook:ci node --help | grep -q passbook.addresses

      - name: Smoke — reth-passbook top-level --help preserves reth subcommands
        run: docker run --rm reth-passbook:ci --help | grep -qiE 'init|db|stage'

      # Runtime drop-in-safety smoke (spec validation matrix: "Drop-in safety
      # (no addresses ⇒ stock node; namespace absent)"). Actually launches each
      # binary as a `--dev` node and asserts: with no watched addresses the
      # stock node is alive (`eth_chainId`) but the `passbook` RPC namespace is
      # ABSENT (`passbook_health` ⇒ method-not-found), and — as a positive
      # control — that WITH addresses the namespace IS present. This exercises
      # the actual runtime property the greps above could never cover.
      - name: Smoke — reth-passbook drop-in safety (runtime)
        run: bash scripts/smoke-dropin.sh reth-passbook:ci

      - name: Smoke — op-reth-passbook drop-in safety (runtime)
        run: bash scripts/smoke-dropin.sh op-reth-passbook:ci

      # --- Publish (only after every build + smoke above has passed) ---------
      # Runs ONLY on push events (push to `main` or a tag); never on
      # pull_request. The images were already built+smoked above as
      # `<bin>:ci`; we just retag and push them — no rebuild.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version selection (per spec):
      #   * tag push       → image tag = the git tag name (release version)
      #   * push to `main` → image tags = the full commit SHA, plus a moving
      #                      `latest` that always points at the newest main
      #                      build. `latest` is NOT applied to release tags so
      #                      it never silently jumps backward to an old tag.
      - name: Publish images to GHCR
        if: github.event_name == 'push'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GHCR namespaces must be lowercase.
          owner_lc="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            versions="${{ github.ref_name }}"
          else
            versions="${{ github.sha }} latest"
          fi
          echo "Publishing tags: ${versions}"
          for bin in reth-passbook op-reth-passbook; do
            img="ghcr.io/${owner_lc}/${bin}"
            for v in ${versions}; do
              docker tag "${bin}:ci" "${img}:${v}"
              docker push "${img}:${v}"
              echo "pushed ${img}:${v}"
            done
          done
