name: CI

# Gate `main` and same-repo pull requests on the EXACT commands run locally
# in Task 9.2:
#   cargo fmt --all --check
#   cargo clippy --workspace --all-targets --locked -- -D warnings
#   cargo test --workspace --locked
# plus the multi-stage Docker image builds + in-image smokes (Task 9.1).
#
# Trigger policy (this repo is public):
#   * push to `main`  — full CI; images published to GHCR tagged with the
#                  commit SHA.
#   * push of a tag   — full CI; images published to GHCR tagged with the
#                  git tag name (release version).
#   * other branch pushes — do NOT build; CI starts when a PR is opened.
#   * pull_request — builds + smokes only, never publishes. Safety against
#                  untrusted fork PRs is
#                  enforced OUTSIDE this file by the repository setting
#                  Settings → Actions → General → "Fork pull request workflows
#                  from outside collaborators" = "Require approval for all
#                  outside collaborators". With that set, a fork PR's workflow
#                  does not run at all until a maintainer approves it, so no
#                  untrusted code executes and no Actions minutes are spent.
#                  (Do NOT add per-job `if` fork guards here — a job skipped by
#                  `if` reports as a PASSING required status check.)
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

# Least privilege. Fork-PR tokens are already read-only with no secret access;
# stating it explicitly also constrains internal-PR and main runs.
permissions:
  contents: read

# `.vendor/` and `.cargo/` are gitignored: every cargo invocation MUST be
# preceded by `bash scripts/seed-vendor.sh`, which shallow-clones the pinned
# optimism monorepo rev and writes the machine-local .cargo/config.toml. It
# needs the system git binary, so git-fetch-with-cli is forced job-wide.
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned toolchain — matches rust-toolchain.toml channel 1.95.0 and its
      # rustfmt + clippy components (the gates below need both).
      - name: Install pinned Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      # Cache the cargo registry + git DB keyed on Cargo.lock. This does NOT
      # break `--locked`: the cache only pre-populates ~/.cargo/{registry,git}
      # (download cache); Cargo.lock itself is committed and untouched, and
      # `--locked` still fails the build if anything would change it. The
      # reth/optimism git compile is very long, so this materially speeds reruns.
      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # REQUIRED before ANY cargo command: .vendor/ + .cargo/config.toml are
      # gitignored and regenerated per machine/CI. ubuntu-latest ships git.
      - name: Seed vendor mirror (.vendor + .cargo/config.toml)
        run: bash scripts/seed-vendor.sh

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets --locked -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

  images:
    name: docker images + smokes + publish
    # Gate on the fmt/clippy/test job: nothing here (build, smoke, OR publish)
    # runs unless `test` passed first. This means no image is ever published
    # from a commit whose Rust suite failed. Cost: this job no longer runs in
    # parallel with `test`, so total CI wall-clock ~= test + images (both
    # contain the long reth compile). `needs:` is job-level only — there is no
    # step-level `needs`, so gating publish on `test` requires gating the whole
    # job. (Build+smoke already gate publish intrinsically: publish steps run
    # after them in this job and a failed step aborts before publish.)
    needs: test
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the top-level block, so contents:read must
    # be restated. packages:write lets GITHUB_TOKEN push to this repo's GHCR
    # namespace — no external registry secret needed. (On pull_request the
    # token is read-only regardless; the publish steps are also `if`-gated to
    # push events, so PRs never attempt a push.)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Dockerfile self-seeds (its build stage runs scripts/seed-vendor.sh),
      # so no host seed step is needed for this job.
      - name: Build reth-passbook image
        run: docker build --target reth-passbook -t reth-passbook:ci .

      - name: Build op-reth-passbook image
        run: docker build --target op-reth-passbook -t op-reth-passbook:ci .

      # Static surface check: the `--passbook.addresses` flag is present on the
      # node command for both binaries (Task 8.3). Cheap, and a prerequisite
      # for the runtime smoke below.
      - name: Smoke — reth-passbook node --help exposes passbook.addresses
        run: docker run --rm reth-passbook:ci node --help | grep -q passbook.addresses

      - name: Smoke — op-reth-passbook node --help exposes passbook.addresses
        run: docker run --rm op-reth-passbook:ci node --help | grep -q passbook.addresses

      - name: Smoke — reth-passbook top-level --help preserves reth subcommands
        run: docker run --rm reth-passbook:ci --help | grep -qiE 'init|db|stage'

      # Runtime drop-in-safety smoke (spec validation matrix: "Drop-in safety
      # (no addresses ⇒ stock node; namespace absent)"). Actually launches each
      # binary as a `--dev` node and asserts: with no watched addresses the
      # stock node is alive (`eth_chainId`) but the `passbook` RPC namespace is
      # ABSENT (`passbook_health` ⇒ method-not-found), and — as a positive
      # control — that WITH addresses the namespace IS present. This exercises
      # the actual runtime property the greps above could never cover.
      - name: Smoke — reth-passbook drop-in safety (runtime)
        run: bash scripts/smoke-dropin.sh reth-passbook:ci

      - name: Smoke — op-reth-passbook drop-in safety (runtime)
        run: bash scripts/smoke-dropin.sh op-reth-passbook:ci

      # --- Publish (only after every build + smoke above has passed) ---------
      # Runs ONLY on push events (push to `main` or a tag); never on
      # pull_request. The images were already built+smoked above as
      # `<bin>:ci`; we just retag and push them — no rebuild.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Version selection (per spec):
      #   * tag push       → image tag = the git tag name (release version)
      #   * push to `main` → image tags = the full commit SHA, plus a moving
      #                      `latest` that always points at the newest main
      #                      build. `latest` is NOT applied to release tags so
      #                      it never silently jumps backward to an old tag.
      - name: Publish images to GHCR
        if: github.event_name == 'push'
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GHCR namespaces must be lowercase.
          owner_lc="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            versions="${{ github.ref_name }}"
          else
            versions="${{ github.sha }} latest"
          fi
          echo "Publishing tags: ${versions}"
          for bin in reth-passbook op-reth-passbook; do
            img="ghcr.io/${owner_lc}/${bin}"
            for v in ${versions}; do
              docker tag "${bin}:ci" "${img}:${v}"
              docker push "${img}:${v}"
              echo "pushed ${img}:${v}"
            done
          done
