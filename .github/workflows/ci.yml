name: CI

# Gates: cargo fmt --all --check / cargo clippy -D warnings / cargo test,
# all --locked. Docker images are NOT built here — the release profile
# (codegen-units=1 + thin-LTO) OOMs free CI runners; images are built and
# published locally via `make docker-publish` (see Makefile).
#
# Triggers: push to `main`, and same-repo pull requests. Other branch pushes
# don't build (CI starts when a PR opens). Fork-PR safety is enforced by the
# repo setting Settings → Actions → General → "Fork pull request workflows
# from outside collaborators" = "Require approval for all outside
# collaborators" (do NOT add per-job `if` fork guards — a job skipped by `if`
# reports as a PASSING required status check).
on:
  push:
    branches: [main]
  pull_request:

# Least privilege. Fork-PR tokens are already read-only with no secret access;
# stating it explicitly also constrains internal-PR and main runs.
permissions:
  contents: read

# `.vendor/` and `.cargo/` are gitignored: every cargo invocation MUST be
# preceded by `bash scripts/seed-vendor.sh`, which shallow-clones the pinned
# optimism monorepo rev and writes the machine-local .cargo/config.toml. It
# needs the system git binary, so git-fetch-with-cli is forced job-wide.
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always
  # Hosted runners have one ~72 GB filesystem, ~17 GB free at start; the
  # reth+op-reth build needs more, so each job reclaims space in a "Free disk
  # space" step. line-tables-only keeps panic/backtrace lines while sharply
  # cutting the reth-scale target/ size + I/O.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Reclaim ~25-35 GB by deleting preinstalled SDKs this build never uses.
      - name: Free disk space
        run: |
          set -x
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost /usr/lib/jvm /usr/share/swift \
            /usr/local/share/powershell "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune --all --force || true
          df -h /

      # Pinned toolchain — matches rust-toolchain.toml channel 1.95.0 and its
      # rustfmt + clippy components (the gates below need both).
      - name: Install pinned Rust 1.95.0
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt, clippy

      # Cache the cargo registry + git DB keyed on Cargo.lock. This does NOT
      # break `--locked`: the cache only pre-populates ~/.cargo/{registry,git}
      # (download cache); Cargo.lock itself is committed and untouched, and
      # `--locked` still fails the build if anything would change it. The
      # reth/optimism git compile is very long, so this materially speeds reruns.
      - name: Cache cargo registry + git
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # REQUIRED before ANY cargo command: .vendor/ + .cargo/config.toml are
      # gitignored and regenerated per machine/CI. ubuntu-latest ships git.
      - name: Seed vendor mirror (.vendor + .cargo/config.toml)
        run: bash scripts/seed-vendor.sh

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-targets --locked -- -D warnings
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked
